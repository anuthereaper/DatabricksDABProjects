# Databricks Asset Bundle for table maintenance project
# Documentation: https://docs.databricks.com/dev-tools/bundles/index.html
bundle:
  name: tablemaint-dab-proj

# Declare variables at the top-level
variables:
  environment: {}
  catalog_name: {}
  schema_name: {}

# IMPORTANT:
# No "include:" block → Databricks Bundles includes ALL files by default.
include:
  - resources/*.yml

targets:
  dev:
    default: true
    workspace:
      host: dbc-9f02badd-3b21.cloud.databricks.com
      profile: devfree
      root_path: /Workspace/Users/anupamchand@gmail.com/mybundle/${bundle.name}/${bundle.target}

    variables:
      environment: dev
      catalog_name: dev
      schema_name: maint

  prod:
    mode: production

    workspace:
      host: https://adb-560023734609075.15.azuredatabricks.net
      profile: oauth
      root_path: /Workspace/Users/anupamchand@gmail.com/mybundle/${bundle.name}/${bundle.target}

    variables:
      environment: prod
      catalog_name: prod
      schema_name: maint

    permissions:
      - user_name: a.chand@shell.com
        level: CAN_MANAGE
